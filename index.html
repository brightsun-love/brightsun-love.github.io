<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 72px;
      letter-spacing: 8px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 15px;
      color: #666;
      font-size: 18px;
    }

    /* SECTION */
    .section {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 1s ease;
    }

    .section:hover img {
      transform: scale(1.05);
    }

    /* DARK OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* TEXT */
    .content {
      position: relative;
      text-align: center;
      color: white;
    }

    .content h2 {
      font-size: 48px;
      margin: 0;
      font-weight: 500;
      letter-spacing: 2px;
    }

    .content p {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.8;
    }

    a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 42px;
      }

      .content h2 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars through design and experience</p>
</div>

<!-- SEDAN -->
<a href="sedan.html">
  <div class="section">
    <img src="sedan.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>Sedan</h2>
      <p>Comfort. Luxury. Balance.</p>
    </div>
  </div>
</a>

<!-- SUV -->

</body>
</html>
