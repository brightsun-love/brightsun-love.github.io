<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    .hero {
      height: 65vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 64px;
      letter-spacing: 6px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      color: #666;
    }

    .featured {
      max-width: 1000px;
      margin: 60px auto;
      padding: 20px;
    }

    .featured-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      height: 350px;
    }

    .featured-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .featured-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    .featured-text {
      position: absolute;
      bottom: 25px;
      left: 25px;
      color: white;
    }

    .featured-text h2 {
      font-size: 34px;
      margin: 0;
    }

    .grid {
      max-width: 1000px;
      margin: 60px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 20px;
    }

    .card {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: all 0.3s ease;
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 75%;
      object-fit: cover;
    }

    .card h2 {
      text-align: center;
      padding: 15px;
      margin: 0;
      font-size: 20px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<!-- FEATURED -->
<a href="sedan.html">
  <div class="featured">
    <div class="featured-card">
      <img src="sedan.jpg">
      <div class="featured-overlay"></div>
      <div class="featured-text">
        <h2>Sedan</h2>
      </div>
    </div>
  </div>
</a>

<!-- GRID -->
<div class="grid">

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <h2>Best of All Time</h2>
    </div>
  </a>

  <!-- ✅ NEW: FASHION HUB -->
  <a href="fashion.html">
    <div class="card">
      <img src="fashion.jpg">
      <h2>Fashion Hub</h2>
    </div>
  </a>

</div>

</body>
</html>
