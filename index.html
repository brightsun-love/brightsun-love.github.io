<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #fff;
      color: #111;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 70px;
      letter-spacing: 8px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 15px;
      color: #666;
      font-size: 18px;
    }

    /* GRID */
    .grid {
      max-width: 1100px;
      margin: 120px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px; /* more space */
    }

    /* CARD */
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      height: 320px; /* bigger = premium feel */
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    /* DARK GRADIENT */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }

    /* TITLE */
    .card h2 {
      position: absolute;
      bottom: 25px;
      left: 25px;
      color: white;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 1px;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .hero h1 {
        font-size: 42px;
      }

      .card {
        height: 240px;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars through categories</p>
</div>

<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <div class="overlay"></div>
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <div class="overlay"></div>
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <div class="overlay"></div>
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <div class="overlay"></div>
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <div class="overlay"></div>
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <div class="overlay"></div>
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <div class="overlay"></div>
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

</body>
</html>
