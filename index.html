<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      font-size: 42px;
      padding: 40px 20px;
      letter-spacing: 3px;
      font-family: "Times New Roman", serif;
    }

    .filters {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .filters button:hover {
      background: black;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .card {
      text-decoration: none;
      color: #111;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: 0.4s;
      opacity: 0;
      transform: translateY(30px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .card-content {
      padding: 18px;
    }

    .card-content h2 {
      margin: 0;
      font-size: 22px;
    }

    .tag {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="filters">
  <button onclick="filterCars('all')">All</button>
  <button onclick="filterCars('luxury')">Luxury</button>
  <button onclick="filterCars('electric')">Electric</button>
</div>

<div class="container">

  <!-- MERCEDES -->
  <a href="mercedes.html" class="card" data-category="luxury">
    <img src="images/car1.jpg">
    <div class="card-content">
      <h2>Mercedes E200</h2>
      <div class="tag">Luxury Sedan</div>
    </div>
  </a>

  <!-- TESLA -->
  <a href="tesla.html" class="card" data-category="electric">
    <img src="tesla-model-3.jpg">
    <div class="card-content">
      <h2>Tesla Model 3</h2>
      <div class="tag">Electric Car</div>
    </div>
  </a>

  <!-- BMW -->
  <a href="bmw.html" class="card" data-category="luxury">
    <img src="bmw.jpg">
    <div class="card-content">
      <h2>BMW 5 Series</h2>
      <div class="tag">Luxury Sedan</div>
    </div>
  </a>

</div>

<script>
function filterCars(category) {
  let cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    if (category === 'all' || card.getAttribute('data-category') === category) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}

const cards = document.querySelectorAll('.card');

function revealCards() {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      card.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealCards);
window.addEventListener('load', revealCards);
</script>

</body>
</html>
