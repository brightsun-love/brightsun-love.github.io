<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO (Enhanced original) */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;

      background: radial-gradient(circle at center, #f5f5f7, #ffffff);
    }

    /* Improved glow (softer + more premium) */
    .hero::before {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      background: rgba(0,0,0,0.04);
      filter: blur(140px);
      border-radius: 50%;
      z-index: 0;
    }

    /* BRAND TITLE */
    .hero h1 {
      position: relative;
      font-size: 64px;
      letter-spacing: 7px;
      font-family: "Times New Roman", serif;
      margin: 0;
      z-index: 1;

      opacity: 0;
      transform: translateY(25px);
      animation: fadeUp 1.1s ease forwards;
    }

    /* refined underline */
    .hero h1::after {
      content: "";
      display: block;
      width: 55px;
      height: 2px;
      background: #111;
      margin: 14px auto 0;
      opacity: 0.5;
    }

    .hero p {
      position: relative;
      margin-top: 20px;
      font-size: 18px;
      color: #666;
      max-width: 520px;
      z-index: 1;

      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.5s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* SECTIONS */
    .section {
      max-width: 900px;
      margin: 120px auto;
      padding: 20px;
      text-align: center;

      opacity: 0;
      transform: translateY(60px);
      transition: all 0.9s ease;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 20px;

      transition: transform 0.5s ease, box-shadow 0.5s ease;
    }

    /* improved hover (more subtle + premium) */
    .section img:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }

    .section h2 {
      font-size: 34px;
      margin-top: 25px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .section p {
      color: #666;
      font-size: 16px;
      margin-top: 10px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 40px;
        letter-spacing: 4px;
      }

      .hero p {
        font-size: 16px;
        padding: 0 15px;
      }

      .section img {
        height: 260px;
      }

      .section h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Discover cars. Experience design. Explore performance.</p>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury redefined. Comfort above everything.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>The future of driving. Electric and intelligent.</p>
  </div>
</a>

<script>
const sections = document.querySelectorAll('.section');

function revealSections() {
  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      section.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealSections);
window.addEventListener('load', revealSections);
</script>

</body>
</html>
