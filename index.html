<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      font-size: 42px;
      padding: 40px 20px;
      letter-spacing: 3px;
      font-family: "Times New Roman", serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .card {
      text-decoration: none;
      color: #111;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      opacity: 0;
      transform: translateY(30px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .card-content {
      padding: 18px;
    }

    .card-content h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 500;
    }

    .tag {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    /* 📱 MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
      header {
        font-size: 32px;
        padding: 30px 10px;
      }

      .container {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 15px;
      }

      .card img {
        height: 200px;
      }

      .card-content h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="container">

  <a href="mercedes.html" class="card">
    <img src="images/car1.jpg">
    <div class="card-content">
      <h2>Mercedes E200</h2>
      <div class="tag">Luxury Sedan</div>
    </div>
  </a>

  <a href="tesla.html" class="card">
    <img src="tesla-model-3.jpg">
    <div class="card-content">
      <h2>Tesla Model 3</h2>
      <div class="tag">Electric Car</div>
    </div>
  </a>

</div>

<script>
/* 🎬 Scroll Animation */
const cards = document.querySelectorAll('.card');

function revealCards() {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      card.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealCards);
window.addEventListener('load', revealCards);
</script>

</body>
</html>
