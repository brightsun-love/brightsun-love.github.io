<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
      overflow: hidden;
    }

    /* PREMIUM TITLE */
    .hero h1 {
      font-size: 78px;
      letter-spacing: 10px;
      font-family: "Times New Roman", serif;
      margin: 0;
      opacity: 0;
      transform: translateY(40px) scale(0.98);
      animation: heroReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hero h1::after {
      content: "";
      display: block;
      width: 80px;
      height: 2px;
      background: #111;
      margin: 18px auto 0;
      opacity: 0.4;
    }

    .hero p {
      margin-top: 20px;
      color: #666;
      font-size: 18px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1.8s ease forwards;
    }

    @keyframes heroReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* SECTION */
    .section {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* IMAGE */
    .section img {
      position: absolute;
      width: 100%;
      height: 120%;
      object-fit: cover;
      transform: translateY(0);
      transition: transform 0.2s linear;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    /* TEXT */
    .content {
      position: relative;
      text-align: center;
      color: white;
      opacity: 0;
      transform: translateY(60px);
      transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .content.show {
      opacity: 1;
      transform: translateY(0);
    }

    .content h2 {
      font-size: 52px;
      margin: 0;
      font-weight: 500;
      letter-spacing: 2px;
    }

    .content p {
      margin-top: 12px;
      font-size: 17px;
      opacity: 0.85;
    }

    a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 42px;
        letter-spacing: 4px;
      }

      .content h2 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars through design and experience</p>
</div>

<!-- SEDAN -->
<a href="sedan.html">
  <div class="section">
    <img src="sedan.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>Sedan</h2>
      <p>Comfort. Luxury. Balance.</p>
    </div>
  </div>
</a>

<!-- SUV -->
<a href="suv.html">
  <div class="section">
    <img src="suv.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>SUV</h2>
      <p>Power. Space. Versatility.</p>
    </div>
  </div>
</a>

<!-- HATCHBACK -->
<a href="hatchback.html">
  <div class="section">
    <img src="hatchback.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>Hatchback</h2>
      <p>Compact. Smart. Efficient.</p>
    </div>
  </div>
</a>

<!-- HYBRID -->
<a href="hybrid.html">
  <div class="section">
    <img src="hybrid.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>Hybrid</h2>
      <p>Efficiency meets performance.</p>
    </div>
  </div>
</a>

<!-- EV -->
<a href="ev.html">
  <div class="section">
    <img src="ev.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>EV</h2>
      <p>The future of mobility.</p>
    </div>
  </div>
</a>

<!-- MPV -->
<a href="mpv.html">
  <div class="section">
    <img src="mpv.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>MPV</h2>
      <p>Family. Comfort. Space.</p>
    </div>
  </div>
</a>

<!-- BEST -->
<a href="best.html">
  <div class="section">
    <img src="bestcar.jpg">
    <div class="overlay"></div>
    <div class="content">
      <h2>Best of All Time</h2>
      <p>Legendary machines.</p>
    </div>
  </div>
</a>

<script>
const contents = document.querySelectorAll('.content');
const images = document.querySelectorAll('.section img');

function animateOnScroll() {
  contents.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 120) {
      el.classList.add('show');
    }
  });

  images.forEach(img => {
    const rect = img.parentElement.getBoundingClientRect();
    const offset = rect.top * 0.12;
    img.style.transform = `translateY(${offset}px)`;
  });
}

window.addEventListener('scroll', animateOnScroll);
window.addEventListener('load', animateOnScroll);
</script>

</body>
</html>
