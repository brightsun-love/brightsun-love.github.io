<!DOCTYPE html>
<html>
<head>
  <title>DriveCraft</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      margin: 0;
      background: #ffffff;
      color: #111;
    }

    header {
      padding: 30px;
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      border-bottom: 1px solid #eee;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .post {
      margin-bottom: 30px;
      transition: transform 0.2s ease;
    }

    .post:hover {
      transform: scale(1.02);
    }

    .post img {
      width: 100%;
      border-radius: 12px;
    }

    .post h2 {
      margin: 12px 0 5px;
      font-size: 22px;
    }

    .post h2 a {
      text-decoration: none;
      color: #111;
    }

    .post h2 a:hover {
      color: #555;
    }

    .tag {
      font-size: 13px;
      color: gray;
    }
  </style>
</head>
<body>

<header>DriveCraft</header>

<div class="container">

  <div class="post">
    <img src="images/car1.jpg">
    <h2><a href="post1.html">Mercedes E200 Review</a></h2>
    <p class="tag">Luxury Sedan</p>
  </div>

  <div class="post">
    <img src="images/car2.jpg">
    <h2><a href="post2.html">Tesla Model 3 Review</a></h2>
    <p class="tag">Electric Car</p>
  </div>

</div>

</body>
</html>
