<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #fafafa;
    }

    .hero h1 {
      font-size: 60px;
      letter-spacing: 6px;
      font-family: "Times New Roman", serif;
      margin: 0;
      font-weight: 600;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards;
    }

    /* subtle brand underline */
    .hero h1::after {
      content: "";
      display: block;
      width: 50px;
      height: 2px;
      background: #111;
      margin: 12px auto 0;
      opacity: 0.7;
    }

    .hero p {
      margin-top: 18px;
      font-size: 17px;
      color: #666;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* SECTIONS */
    .section {
      max-width: 900px;
      margin: 110px auto;
      padding: 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.9s ease;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 18px;
      transition: transform 0.5s ease;
    }

    .section img:hover {
      transform: scale(1.015);
    }

    .section h2 {
      font-size: 30px;
      margin-top: 22px;
      font-weight: 500;
    }

    .section p {
      color: #666;
      font-size: 15px;
      margin-top: 8px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 36px;
        letter-spacing: 3px;
      }

      .hero p {
        font-size: 15px;
        padding: 0 15px;
      }

      .section img {
        height: 250px;
      }

      .section h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Discover cars through design, performance, and experience.</p>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury sedan focused on comfort and refinement.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>Electric performance with a technology-first approach.</p>
  </div>
</a>

<script>
const sections = document.querySelectorAll('.section');

function revealSections() {
  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      section.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealSections);
window.addEventListener('load', revealSections);
</script>

</body>
</html>
