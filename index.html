<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
    }

    .hero h1 {
      font-size: 52px;
      letter-spacing: 5px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 12px;
      font-size: 16px;
      color: #666;
    }

    /* SECTION */
    .section {
      max-width: 850px;
      margin: 100px auto;
      padding: 20px;
      text-align: center;
    }

    .section img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      border-radius: 16px;
    }

    .section h2 {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 500;
    }

    .section p {
      color: #666;
      margin-top: 8px;
      font-size: 15px;
    }

    a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 34px;
      }

      .section img {
        height: 240px;
      }

      .section h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Cars. Design. Experience.</p>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury sedan focused on comfort and refinement.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>Electric performance with a technology-first approach.</p>
  </div>
</a>

</body>
</html>
