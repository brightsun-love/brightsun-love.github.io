<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #fff;
      color: #111;
    }

    .hero {
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      letter-spacing: 5px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      color: #666;
      margin-top: 10px;
    }

    .grid {
      max-width: 1100px;
      margin: 60px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      padding: 20px;
    }

    .card {
      height: 220px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75);
      transition: 0.4s;
    }

    .card:hover img {
      filter: brightness(0.6);
    }

    .card h2 {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 26px;
      margin: 0;
      font-weight: 500;
      letter-spacing: 1px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

</body>
</html>
