<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    /* NAVBAR */
    .nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      border-bottom: 1px solid #eee;
      z-index: 100;
    }

    .logo {
      font-family: "Times New Roman", serif;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle, #f5f5f7, #fff);
    }

    .hero h1 {
      font-size: 60px;
      letter-spacing: 6px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 15px;
      color: #666;
    }

    /* SECTIONS */
    .section {
      max-width: 900px;
      margin: 120px auto;
      padding: 20px;
      text-align: center;
    }

    .section img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 20px;
    }

    .section h2 {
      margin-top: 20px;
      font-size: 32px;
    }

    .section p {
      color: #666;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">CARLOG</div>
  <div>
    <a href="index.html">Home</a>
    <a href="#">Cars</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Discover cars. Experience design.</p>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury redefined.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>Future of driving.</p>
  </div>
</a>

</body>
</html>
