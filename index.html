<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      background: white;
    }

    /* Title (Roman style feel) */
    header {
      font-family: "Times New Roman", serif;
      font-size: 40px;
      padding: 30px;
      border-bottom: 1px solid #eee;
      letter-spacing: 3px;
    }

    /* Options (Georgia font) */
    .menu button {
      font-family: Georgia, serif;
      font-size: 18px;
      margin: 20px;
      padding: 10px 20px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: black;
      color: white;
    }

    /* Content section */
    .content {
      margin-top: 30px;
    }

    .content h2 {
      font-family: Georgia, serif;
      font-size: 24px;
    }

    .content img {
      width: 60%;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<!-- OPTIONS -->
<div class="menu">
  <button onclick="showLuxury()">Luxury</button>
  <button onclick="showElectric()">Electric</button>
</div>

<!-- RESULT AREA -->
<div class="content" id="contentArea"></div>

<script>
function showLuxury() {
  document.getElementById("contentArea").innerHTML = `
    <h2>Mercedes E200</h2>
    <img src="images/car1.jpg">
  `;
}

function showElectric() {
  document.getElementById("contentArea").innerHTML = `
    <h2>Tesla Model 3</h2>
    <img src="images/car2.jpg">
  `;
}
</script>

</body>
</html>
