<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url("images/car1.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero h1 {
      position: relative;
      color: white;
      font-size: 48px;
      letter-spacing: 4px;
      font-family: "Times New Roman", serif;
    }

    /* SECTION */
    .section {
      max-width: 900px;
      margin: 120px auto;
      padding: 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 20px;
      margin-top: 20px;
      transition: transform 0.6s ease;
    }

    .section img:hover {
      transform: scale(1.02);
    }

    .section h2 {
      font-size: 32px;
      margin-top: 20px;
      font-weight: 500;
    }

    .section p {
      color: #666;
      font-size: 16px;
      margin-top: 10px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 32px;
      }

      .section img {
        height: 260px;
      }

      .section h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury redefined. Comfort above everything.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>The future of driving. Electric and intelligent.</p>
  </div>
</a>

<script>
const sections = document.querySelectorAll('.section');

function revealSections() {
  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      section.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealSections);
window.addEventListener('load', revealSections);
</script>

</body>
</html>
