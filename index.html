<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #ffffff;
      color: #111;
    }

    /* HERO */
    .hero {
      height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 64px;
      letter-spacing: 6px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 12px;
      color: #666;
      font-size: 16px;
    }

    /* GRID */
    .grid {
      max-width: 900px;
      margin: 80px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: all 0.3s ease;
      aspect-ratio: 1 / 1; /* PERFECT SQUARE */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    /* IMAGE */
    .card img {
      width: 100%;
      height: 75%;
      object-fit: cover;
    }

    /* TEXT */
    .card h2 {
      font-size: 20px;
      margin: 0;
      padding: 15px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.5px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<!-- GRID -->
<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

</body>
</html>
