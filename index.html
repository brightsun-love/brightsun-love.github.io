<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      background: #fff;
      color: #111;
    }

    header {
      font-family: "Times New Roman", serif;
      font-size: 42px;
      padding: 30px;
      letter-spacing: 4px;
      border-bottom: 1px solid #eee;
    }

    .menu {
      margin-top: 30px;
    }

    .menu button {
      font-family: Georgia, serif;
      font-size: 18px;
      margin: 10px;
      padding: 12px 25px;
      border-radius: 30px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: black;
      color: white;
    }

    .content {
      margin-top: 40px;
    }

    .content img {
      width: 60%;
      max-width: 600px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="menu">
  <button onclick="showLuxury()">Luxury</button>
  <button onclick="showElectric()">Electric</button>
</div>

<div class="content" id="contentArea"></div>

<script>
function showLuxury() {
  document.getElementById("contentArea").innerHTML = `
    <h2>Mercedes E200</h2>
    <img src="car1.jpg" onerror="this.src='car1.jpeg'">
  `;
}

function showElectric() {
  document.getElementById("contentArea").innerHTML = `
    <h2>Tesla Model 3</h2>
    <img src="tesla-model-3.jpg">
  `;
}
</script>

</body>
</html>
