<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      font-size: 44px;
      padding: 60px 20px 30px;
      letter-spacing: 4px;
      font-family: "Times New Roman", serif;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .card {
      text-decoration: none;
      color: #111;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: all 0.6s ease;
      opacity: 0;
      transform: translateY(40px) scale(0.98);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .card:hover {
      transform: scale(1.015);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .card-content {
      padding: 25px;
      text-align: center;
    }

    .card-content h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .tag {
      font-size: 14px;
      color: #777;
      margin-top: 8px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header {
        font-size: 32px;
        padding: 40px 10px 20px;
      }

      .card img {
        height: 220px;
      }

      .card-content h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="container">

  <a href="mercedes.html" class="card">
    <img src="images/car1.jpg">
    <div class="card-content">
      <h2>Mercedes E200</h2>
      <div class="tag">Luxury Sedan</div>
    </div>
  </a>

  <a href="tesla.html" class="card">
    <img src="tesla-model-3.jpg">
    <div class="card-content">
      <h2>Tesla Model 3</h2>
      <div class="tag">Electric Car</div>
    </div>
  </a>

</div>

<script>
const cards = document.querySelectorAll('.card');

function revealCards() {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 80) {
      card.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealCards);
window.addEventListener('load', revealCards);
</script>

</body>
</html>
