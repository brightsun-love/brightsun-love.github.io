<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    /* HEADER */
    header {
      text-align: center;
      font-size: 42px;
      padding: 40px 20px;
      letter-spacing: 3px;
      font-family: "Times New Roman", serif;
    }

    /* GRID */
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    /* CARD */
    .card {
      text-decoration: none;
      color: #111;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
    }

    .tag {
      font-size: 13px;
      color: gray;
      margin-top: 5px;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="container">

  <!-- MERCEDES -->
  <a href="mercedes.html" class="card">
    <img src="images/car1.jpg">
    <div class="card-content">
      <h2>Mercedes E200</h2>
      <div class="tag">Luxury Sedan</div>
    </div>
  </a>

  <!-- TESLA -->
  <a href="tesla.html" class="card">
    <img src="tesla-model-3.jpg">
    <div class="card-content">
      <h2>Tesla Model 3</h2>
      <div class="tag">Electric Car</div>
    </div>
  </a>

</div>

</body>
</html>
