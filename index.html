<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    /* HERO PARALLAX */
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 120%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(1.1);
      transition: transform 1s ease;
    }

    .hero-text {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 52px;
      letter-spacing: 5px;
      font-family: "Times New Roman", serif;
      background: rgba(0,0,0,0.3);
    }

    /* SECTION */
    .section {
      max-width: 900px;
      margin: 120px auto;
      padding: 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(60px);
      transition: all 1s ease;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 20px;
      transition: transform 0.6s ease;
    }

    .section img:hover {
      transform: scale(1.03);
    }

    .section h2 {
      font-size: 34px;
      margin-top: 20px;
      font-weight: 500;
    }

    .section p {
      color: #666;
      font-size: 16px;
      margin-top: 10px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero-text {
        font-size: 32px;
      }

      .section img {
        height: 260px;
      }

      .section h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <img src="images/car1.jpg" id="heroImg">
  <div class="hero-text">CARLOG</div>
</div>

<!-- MERCEDES -->
<a href="mercedes.html">
  <div class="section">
    <img src="images/car1.jpg">
    <h2>Mercedes E200</h2>
    <p>Luxury redefined. Comfort above everything.</p>
  </div>
</a>

<!-- TESLA -->
<a href="tesla.html">
  <div class="section">
    <img src="tesla-model-3.jpg">
    <h2>Tesla Model 3</h2>
    <p>The future of driving. Electric and intelligent.</p>
  </div>
</a>

<script>
/* PARALLAX EFFECT */
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let heroImg = document.getElementById("heroImg");
  heroImg.style.transform = "translateY(" + scroll * 0.3 + "px) scale(1.1)";
});

/* SECTION REVEAL */
const sections = document.querySelectorAll('.section');

function revealSections() {
  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      section.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealSections);
window.addEventListener('load', revealSections);
</script>

</body>
</html>
