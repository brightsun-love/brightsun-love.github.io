<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      background: #fff;
      color: #111;
    }

    header {
      font-family: "Times New Roman", serif;
      font-size: 42px;
      padding: 30px;
      letter-spacing: 4px;
      border-bottom: 1px solid #eee;
    }

    .menu {
      margin-top: 30px;
    }

    .menu button {
      font-family: Georgia, serif;
      font-size: 18px;
      margin: 10px;
      padding: 12px 25px;
      border-radius: 30px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .menu button:hover {
      background: black;
      color: white;
      transform: scale(1.05);
    }

    .content {
      margin-top: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .content.show {
      opacity: 1;
    }

    .content h2 {
      font-family: Georgia, serif;
      font-size: 26px;
      margin-bottom: 15px;
    }

    .content img {
      width: 60%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>CARLOG</header>

<div class="menu">
  <button onclick="showLuxury()">Luxury</button>
  <button onclick="showElectric()">Electric</button>
</div>

<div class="content" id="contentArea"></div>

<script>
function showLuxury() {
  let area = document.getElementById("contentArea");
  area.classList.remove("show");

  setTimeout(() => {
    area.innerHTML = `
      <h2>Mercedes E200</h2>
      <img src="images/car1.jpg">
    `;
    area.classList.add("show");
  }, 100);
}

function showElectric() {
  let area = document.getElementById("contentArea");
  area.classList.remove("show");

  setTimeout(() => {
    area.innerHTML = `
      <h2>Tesla Model 3</h2>
      <img src="images/tesla%20model%203.jpg">
    `;
    area.classList.add("show");
  }, 100);
}
</script>

</body>
</html>
