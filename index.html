<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #ffffff;
      color: #111;
    }

    /* HERO */
    .hero {
      height: 75vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 68px;
      letter-spacing: 7px;
      font-family: "Times New Roman", serif;
      margin: 0;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards;
    }

    .hero p {
      margin-top: 15px;
      color: #666;
      font-size: 17px;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* GRID */
    .grid {
      max-width: 1000px;
      margin: 100px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 35px;
    }

    /* CARD BOX */
    .card {
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
    }

    /* IMAGE */
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    /* TEXT BOX */
    .card h2 {
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      padding: 18px;
      margin: 0;
      letter-spacing: 0.5px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<!-- GRID -->
<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

</body>
</html>
