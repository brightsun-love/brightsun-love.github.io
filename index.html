<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #fff;
      color: #111;
    }

    .hero {
      height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 60px;
      letter-spacing: 6px;
      font-family: "Times New Roman", serif;
      margin: 0;
      font-weight: 600;
    }

    .hero p {
      color: #666;
      margin-top: 12px;
    }

    .grid {
      max-width: 1100px;
      margin: 80px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      cursor: pointer;
      height: 250px;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    .card h2 {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 28px;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <div class="overlay"></div>
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="SUV.jpg">
      <div class="overlay"></div>
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="Hatchback.jpg">
      <div class="overlay"></div>
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="Hybrid.jpg">
      <div class="overlay"></div>
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="EV.jpg">
      <div class="overlay"></div>
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <div class="overlay"></div>
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <div class="overlay"></div>
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

</body>
</html>
