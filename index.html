<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #fff;
      color: #111;
    }

    /* HERO (KEEP PREMIUM) */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
      text-align: center;
    }

    .hero h1 {
      font-size: 72px;
      letter-spacing: 8px;
      font-family: "Times New Roman", serif;
      margin: 0;
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      animation: heroReveal 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .hero h1::after {
      content: "";
      display: block;
      width: 70px;
      height: 2px;
      background: #111;
      margin: 16px auto 0;
      opacity: 0.4;
    }

    .hero p {
      margin-top: 18px;
      color: #666;
      font-size: 18px;
      opacity: 0;
      transform: translateY(20px);
      animation: heroReveal 1.8s ease forwards;
    }

    @keyframes heroReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* GRID */
    .grid {
      max-width: 1100px;
      margin: 100px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    /* CARD */
    .card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16/9; /* PERFECT RATIO */
      transform: translateY(30px);
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.22,1,0.36,1);
    }

    .card.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* IMAGE */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
    }

    /* TEXT */
    .card h2 {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 30px;
      margin: 0;
      font-weight: 500;
      letter-spacing: 1px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 25px;
      }

      .hero h1 {
        font-size: 42px;
      }

      .card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<!-- GRID -->
<div class="grid">

  <a href="sedan.html">
    <div class="card">
      <img src="sedan.jpg">
      <div class="overlay"></div>
      <h2>Sedan</h2>
    </div>
  </a>

  <a href="suv.html">
    <div class="card">
      <img src="suv.jpg">
      <div class="overlay"></div>
      <h2>SUV</h2>
    </div>
  </a>

  <a href="hatchback.html">
    <div class="card">
      <img src="hatchback.jpg">
      <div class="overlay"></div>
      <h2>Hatchback</h2>
    </div>
  </a>

  <a href="hybrid.html">
    <div class="card">
      <img src="hybrid.jpg">
      <div class="overlay"></div>
      <h2>Hybrid</h2>
    </div>
  </a>

  <a href="ev.html">
    <div class="card">
      <img src="ev.jpg">
      <div class="overlay"></div>
      <h2>EV</h2>
    </div>
  </a>

  <a href="mpv.html">
    <div class="card">
      <img src="mpv.jpg">
      <div class="overlay"></div>
      <h2>MPV</h2>
    </div>
  </a>

  <a href="best.html">
    <div class="card">
      <img src="bestcar.jpg">
      <div class="overlay"></div>
      <h2>Best of All Time</h2>
    </div>
  </a>

</div>

<script>
const cards = document.querySelectorAll('.card');

function revealCards() {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      card.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealCards);
window.addEventListener('load', revealCards);
</script>

</body>
</html>
