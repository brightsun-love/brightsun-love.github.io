<!DOCTYPE html>
<html>
<head>
  <title>CARLOG</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #fff;
      color: #111;
    }

    /* HERO */
    .hero {
      height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle, #f5f5f7, #ffffff);
    }

    .hero h1 {
      font-size: 54px;
      letter-spacing: 5px;
      font-family: "Times New Roman", serif;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      color: #666;
    }

    /* GRID */
    .grid {
      max-width: 1000px;
      margin: 80px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 20px;
    }

    .card {
      height: 160px;
      border-radius: 20px;
      border: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 500;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .card:hover {
      background: #111;
      color: #fff;
      transform: scale(1.03);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>CARLOG</h1>
  <p>Explore cars by category</p>
</div>

<div class="grid">

  <a href="sedan.html"><div class="card">Sedan</div></a>
  <a href="suv.html"><div class="card">SUV</div></a>
  <a href="hatchback.html"><div class="card">Hatchback</div></a>
  <a href="hybrid.html"><div class="card">Hybrid</div></a>
  <a href="ev.html"><div class="card">EV</div></a>
  <a href="mpv.html"><div class="card">MPV</div></a>
  <a href="best.html"><div class="card">Best of All Time</div></a>

</div>

</body>
</html>
