<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 { text-align: center; }

    select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Fashion Hub</h1>

<select id="height">
  <option value="">Height</option>
  <option value="short">Below 165 cm</option>
  <option value="medium">165–175 cm</option>
  <option value="tall">Above 175 cm</option>
</select>

<select id="bodyShape">
  <option value="">Body</option>
  <option value="rectangle">Straight</option>
  <option value="triangle">Lower heavy</option>
  <option value="inverted">Upper broad</option>
  <option value="oval">Stomach</option>
</select>

<select id="goal">
  <option value="">Goal</option>
  <option value="taller">Taller</option>
  <option value="slimmer">Slimmer</option>
  <option value="broader">Broader</option>
</select>

<select id="fit">
  <option value="">Fit</option>
  <option value="slim">Slim</option>
  <option value="regular">Regular</option>
  <option value="oversized">Oversized</option>
</select>

<select id="occasion">
  <option value="">Occasion</option>
  <option value="casual">Casual</option>
  <option value="formal">Formal</option>
  <option value="party">Party</option>
</select>

<select id="climate">
  <option value="">Weather</option>
  <option value="hot">Hot</option>
  <option value="moderate">Moderate</option>
  <option value="cold">Cold</option>
</select>

<select id="vibe">
  <option value="">Style</option>
  <option value="minimal">Minimal</option>
  <option value="classic">Classic</option>
  <option value="street">Street</option>
  <option value="traditional">Traditional</option>
</select>

<select id="footwear">
  <option value="">Shoes</option>
  <option value="sneakers">Sneakers</option>
  <option value="formal">Formal shoes</option>
  <option value="boots">Boots</option>
</select>

<button onclick="runEngine()">Get Recommendation</button>

<div id="result" class="result"></div>

<script src="fashion.js"></script>

</body>
</html>
