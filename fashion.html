<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4e8ef);
      color: #111;
    }

    .container {
      max-width: 850px;
      margin: auto;
      padding: 30px 20px;
    }

    /* HEADER */
    h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 42px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .helper {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
    }

    /* MAIN CARD */
    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #555;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #111, #333);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* RESULT */
    #result {
      margin-top: 30px;
    }

    .result-card {
      background: #fff;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .result-card:hover {
      transform: translateY(-3px);
    }

    .result-card h4 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    .score {
      float: right;
      font-size: 13px;
      color: #555;
      background: #f0f0f0;
      padding: 4px 10px;
      border-radius: 10px;
    }

    ul {
      padding-left: 18px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Fashion Hub</h1>
  <p class="helper">Smart styling based on your body & preferences</p>

  <div class="card">

    <div class="grid">

      <select id="height">
        <option value="">Height</option>
        <option value="short">Below 165 cm</option>
        <option value="medium">165–175 cm</option>
        <option value="tall">Above 175 cm</option>
      </select>

      <select id="bodyShape">
        <option value="">Body Shape</option>
        <option value="rectangle">Straight</option>
        <option value="triangle">Lower heavy</option>
        <option value="inverted">Upper broad</option>
        <option value="oval">Stomach focus</option>
      </select>

      <select id="goal">
        <option value="">Goal</option>
        <option value="taller">Look taller</option>
        <option value="slimmer">Look slimmer</option>
        <option value="broader">Look broader</option>
      </select>

      <select id="undertone">
        <option value="">Undertone</option>
        <option value="warm">Warm</option>
        <option value="cool">Cool</option>
      </select>

      <select id="fit">
        <option value="">Fit</option>
        <option value="slim">Slim</option>
        <option value="regular">Regular</option>
        <option value="oversized">Oversized</option>
      </select>

      <select id="occasion">
        <option value="">Occasion</option>
        <option value="casual">Casual</option>
        <option value="formal">Formal</option>
        <option value="party">Party</option>
      </select>

      <select id="climate">
        <option value="">Climate</option>
        <option value="hot">Hot</option>
        <option value="cold">Cold</option>
      </select>

      <select id="vibe">
        <option value="">Style</option>
        <option value="minimal">Minimal</option>
        <option value="classic">Classic</option>
        <option value="street">Streetwear</option>
        <option value="traditional">Traditional</option>
      </select>

    </div>

    <select id="footwear">
      <option value="">Footwear</option>
      <option value="sneakers">Sneakers</option>
      <option value="formal">Formal</option>
      <option value="boots">Boots</option>
    </select>

    <button onclick="runEngine()">Get Outfit</button>

  </div>

  <div id="result"></div>

</div>

</body>
</html>
