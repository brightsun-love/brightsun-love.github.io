<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 46px;
      margin-bottom: 10px;
    }

    .helper {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    select option {
      color: #000;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 40px;
    }

    .result-card {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .score {
      float: right;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Fashion Hub</h1>
  <p class="helper">Smart styling system</p>

  <div class="card">

    <div class="grid">
      <select id="height">
        <option value="">Height</option>
        <option value="short">Below 165 cm</option>
        <option value="medium">165–175 cm</option>
        <option value="tall">Above 175 cm</option>
      </select>

      <select id="bodyShape">
        <option value="">Body</option>
        <option value="rectangle">Straight</option>
        <option value="triangle">Lower heavy</option>
        <option value="inverted">Upper broad</option>
        <option value="oval">Stomach</option>
      </select>

      <select id="goal">
        <option value="">Goal</option>
        <option value="taller">Taller</option>
        <option value="slimmer">Slimmer</option>
      </select>

      <select id="vibe">
        <option value="">Style</option>
        <option value="minimal">Minimal</option>
        <option value="classic">Classic</option>
        <option value="street">Street</option>
        <option value="traditional">Traditional</option>
      </select>
    </div>

    <button onclick="runEngine()">Generate Outfit</button>

  </div>

  <div id="result"></div>

</div>

<!-- 🔥 IMPORTANT FIX -->
<script src="fashion.js"></script>

</body>
</html>
