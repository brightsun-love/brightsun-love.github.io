<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #fff;
    }

    h1 {
      text-align: center;
    }

    p.helper {
      font-size: 14px;
      color: #666;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Fashion Hub</h1>
<p class="helper">Choose what stands out most about you (even if multiple apply)</p>

<select id="height">
  <option value="">Your Height</option>
  <option value="short">Below 165 cm</option>
  <option value="medium">165–175 cm</option>
  <option value="tall">Above 175 cm</option>
</select>

<select id="bodyShape">
  <option value="">What stands out most about your body?</option>
  <option value="rectangle">Body looks straight</option>
  <option value="triangle">Lower body heavier</option>
  <option value="inverted">Upper body broader</option>
  <option value="oval">Stomach stands out</option>
</select>

<select id="goal">
  <option value="">What do you want?</option>
  <option value="taller">Look taller</option>
  <option value="slimmer">Look slimmer</option>
  <option value="broader">Look broader</option>
  <option value="balanced">Balanced</option>
</select>

<select id="legRatio">
  <option value="">Your body looks like</option>
  <option value="short">Upper body longer</option>
  <option value="balanced">Balanced</option>
  <option value="long">Legs longer</option>
</select>

<select id="undertone">
  <option value="">Jewelry that suits you</option>
  <option value="warm">Gold</option>
  <option value="cool">Silver</option>
  <option value="neutral">Both</option>
</select>

<select id="contrast">
  <option value="">Your look</option>
  <option value="low">Similar tones</option>
  <option value="medium">Slight difference</option>
  <option value="high">High contrast</option>
</select>

<select id="fit">
  <option value="">Your fit</option>
  <option value="slim">Slim</option>
  <option value="regular">Regular</option>
  <option value="oversized">Oversized</option>
</select>

<select id="occasion">
  <option value="">Occasion</option>
  <option value="casual">Casual</option>
  <option value="formal">Formal</option>
  <option value="party">Party</option>
</select>

<select id="climate">
  <option value="">Weather</option>
  <option value="hot">Hot</option>
  <option value="moderate">Moderate</option>
  <option value="cold">Cold</option>
</select>

<select id="style">
  <option value="">Style</option>
  <option value="minimal">Minimal</option>
  <option value="classic">Classic</option>
  <option value="street">Street</option>
</select>

<select id="footwear">
  <option value="">Shoes</option>
  <option value="sneakers">Sneakers</option>
  <option value="formal">Formal</option>
  <option value="boots">Boots</option>
</select>

<button onclick="runEngine()">Get Recommendation</button>

<div id="result" class="result"></div>

<script src="fashion.js"></script>

</body>
</html>
