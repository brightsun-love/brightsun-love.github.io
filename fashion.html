<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f5f5f7;
      color: #111;
    }

    h1 {
      text-align: center;
      font-weight: 600;
    }

    p.helper {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: white;
      border: 1px solid #eee;
    }

    .score {
      float: right;
      color: #666;
      font-size: 13px;
    }

    ul {
      padding-left: 18px;
    }
  </style>
</head>

<body>

<h1>Fashion Hub</h1>
<p class="helper">Smart styling based on your body & preferences</p>

<!-- KEEP YOUR EXISTING SELECTS (UNCHANGED) -->

<!-- (your full input section stays same) -->

<button onclick="runEngine()">Get Recommendation</button>

<div id="result"></div>

<script src="fashion.js"></script>

</body>
</html>
