<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #fff;
    }

    h1 {
      text-align: center;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Fashion Hub</h1>

<!-- BODY -->
<select id="height">
  <option value="">Your Height</option>
  <option value="short">Below 165 cm</option>
  <option value="medium">165–175 cm</option>
  <option value="tall">Above 175 cm</option>
</select>

<select id="bodyShape">
  <option value="">Which describes your body best?</option>
  <option value="rectangle">Shoulders and waist similar</option>
  <option value="triangle">Lower body heavier</option>
  <option value="inverted">Upper body broader</option>
  <option value="oval">Weight around stomach</option>
</select>

<select id="goal">
  <option value="">What do you want to improve?</option>
  <option value="taller">Look taller</option>
  <option value="slimmer">Look slimmer</option>
  <option value="broader">Look more strong/broad</option>
  <option value="balanced">Look balanced</option>
</select>

<select id="legRatio">
  <option value="">Your body looks more like</option>
  <option value="short">Upper body longer</option>
  <option value="balanced">Balanced</option>
  <option value="long">Legs longer</option>
</select>

<!-- COLOR -->
<select id="undertone">
  <option value="">Which jewelry looks better?</option>
  <option value="warm">Gold looks better</option>
  <option value="cool">Silver looks better</option>
  <option value="neutral">Both look fine</option>
  <option value="unknown">Not sure</option>
</select>

<select id="tone">
  <option value="">Your skin tone</option>
  <option value="light">Light</option>
  <option value="medium">Medium</option>
  <option value="dark">Dark</option>
</select>

<select id="contrast">
  <option value="">Your overall look</option>
  <option value="low">Everything similar tone</option>
  <option value="medium">Slight difference</option>
  <option value="high">Strong contrast</option>
</select>

<!-- STYLE -->
<select id="silhouette">
  <option value="">You prefer clothes that are</option>
  <option value="structured">Tight & sharp</option>
  <option value="balanced">Normal fit</option>
  <option value="relaxed">Loose & relaxed</option>
</select>

<select id="fit">
  <option value="">Your usual clothing fit</option>
  <option value="slim">Slim fit</option>
  <option value="regular">Regular fit</option>
  <option value="oversized">Loose/oversized</option>
</select>

<!-- CONTEXT -->
<select id="occasion">
  <option value="">Where will you wear this?</option>
  <option value="casual">Daily casual</option>
  <option value="smart">Smart casual</option>
  <option value="formal">Formal</option>
  <option value="party">Party</option>
</select>

<select id="climate">
  <option value="">Your weather</option>
  <option value="hot">Hot</option>
  <option value="moderate">Moderate</option>
  <option value="cold">Cold</option>
</select>

<select id="time">
  <option value="">You go out mostly</option>
  <option value="day">Day</option>
  <option value="night">Night</option>
</select>

<select id="budget">
  <option value="">Your budget</option>
  <option value="low">Low</option>
  <option value="medium">Medium</option>
  <option value="high">High</option>
</select>

<!-- STYLE IDENTITY -->
<select id="style">
  <option value="">Which style do you like?</option>
  <option value="minimal">Simple & clean</option>
  <option value="classic">Classic & formal</option>
  <option value="street">Trendy / street</option>
  <option value="sporty">Sporty</option>
</select>

<select id="risk">
  <option value="">Your preference</option>
  <option value="safe">Safe</option>
  <option value="balanced">Balanced</option>
  <option value="bold">Bold</option>
</select>

<!-- FOOTWEAR -->
<select id="footwear">
  <option value="">Shoes you wear most</option>
  <option value="sneakers">Sneakers</option>
  <option value="formal">Formal shoes</option>
  <option value="boots">Boots</option>
  <option value="sandals">Sandals</option>
</select>

<button onclick="runEngine()">Get Recommendation</button>

<div id="result" class="result"></div>

<script src="fashion.js"></script>

</body>
</html>
