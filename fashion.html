<!DOCTYPE html>
<html>
<head>
  <title>Fashion Hub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .helper {
      text-align: center;
      color: #777;
      margin-bottom: 25px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    .result-card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-top: 20px;
    }

    .result-card h4 {
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      background: #eee;
      margin-left: 10px;
    }

    ul {
      padding-left: 18px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Fashion Hub</h1>
  <p class="helper">Personal styling based on your body & preference</p>

  <div class="card">

    <select id="height">
      <option value="">Your Height</option>
      <option value="short">Below 165 cm</option>
      <option value="medium">165–175 cm</option>
      <option value="tall">Above 175 cm</option>
    </select>

    <select id="bodyShape">
      <option value="">What stands out most?</option>
      <option value="rectangle">Body looks straight</option>
      <option value="triangle">Lower body heavier</option>
      <option value="inverted">Upper body broader</option>
      <option value="oval">Stomach stands out</option>
    </select>

    <select id="goal">
      <option value="">Your goal</option>
      <option value="taller">Look taller</option>
      <option value="slimmer">Look slimmer</option>
      <option value="broader">Look broader</option>
    </select>

    <select id="undertone">
      <option value="">Jewelry suits you</option>
      <option value="warm">Gold</option>
      <option value="cool">Silver</option>
    </select>

    <select id="fit">
      <option value="">Your fit</option>
      <option value="slim">Slim</option>
      <option value="regular">Regular</option>
      <option value="oversized">Oversized</option>
    </select>

    <select id="occasion">
      <option value="">Occasion</option>
      <option value="casual">Casual</option>
      <option value="formal">Formal</option>
      <option value="party">Party</option>
    </select>

    <select id="climate">
      <option value="">Weather</option>
      <option value="hot">Hot</option>
      <option value="cold">Cold</option>
    </select>

    <select id="vibe">
      <option value="">Your style vibe</option>
      <option value="minimal">Minimal</option>
      <option value="classic">Classic</option>
      <option value="street">Streetwear</option>
      <option value="traditional">Traditional</option>
    </select>

    <select id="footwear">
      <option value="">Shoes</option>
      <option value="sneakers">Sneakers</option>
      <option value="formal">Formal</option>
      <option value="boots">Boots</option>
    </select>

    <button onclick="runEngine()">Get Outfit</button>

  </div>

  <div id="result"></div>

</div>

</body>
</html>
